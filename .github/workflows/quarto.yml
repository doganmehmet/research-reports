name: Render Quarto Website

on:
  push:
    branches:
      - main  # or your default branch

  # 👇 ADD THIS BLOCK TO ENABLE A MANUAL TRIGGER BUTTON
  workflow_dispatch:

  # 👇 ADD THIS BLOCK FOR THE DAILY SCHEDULE
  schedule:
    # Runs daily at 23:00 CET/CEST (21:00/22:00 UTC)
    - cron: '0 21 16 * *'

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Set up Python (needed for post_rename.py and any Python chunks)
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. Install Quarto
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install jupyter pyyaml "pandas>=2.2,<3.0" numpy "pandas_datareader==0.10.0" yfinance matplotlib openai google-genai anthropic

      # 4. Restore archived reports from previous deployments
      - name: Restore archived reports from gh-pages
        run: |
          mkdir -p archived_reports
          if git fetch origin gh-pages --depth=1 2>/dev/null; then
            for f in $(git ls-tree --name-only origin/gh-pages -- archive/ 2>/dev/null); do
              if [[ "$f" == report_*.html ]]; then
                git show "origin/gh-pages:archive/$f" > "archived_reports/$f" 2>/dev/null && echo "Restored: $f"
              fi
            done
          fi
          echo "Archived reports restored:"
          ls archived_reports/*.html 2>/dev/null || echo "  (none)"

      # 5. Update archive/index.qmd before render so Quarto renders the correct list
      - name: Update archive index
        run: |
          python3 -c "
          import os, time
          archive_dir = 'archived_reports'
          files = sorted([f for f in os.listdir(archive_dir) if f.endswith('.html')], reverse=True) if os.path.isdir(archive_dir) else []
          today_report = f'report_{time.strftime(\"%Y-%m-%d\")}.html'
          if today_report not in files:
              files.insert(0, today_report)
          items = '\n'.join(f'- [{f.replace(\".html\", \"\")}]({f})' for f in files) if files else 'No archived reports yet.'
          content = f'---\ntitle: Archive\n---\n\n# Past Reports\n\n{items}\n'
          with open('archive/index.qmd', 'w') as fh:
              fh.write(content)
          print(f'Updated archive/index.qmd with {len(files)} reports')
          "

      # 6. Render the site
      - name: Render Quarto site
        run: quarto render
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_SECRET: ${{ secrets.GEMINI_API_SECRET }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}


      # 👇 ADD THIS NEW STEP HERE
      # 5. Commit and push the updated archive file
      # - name: Commit and Push updated archive
      #   run: |
      #     git config --global user.name "github-actions[bot]"
      #     git config --global user.email "github-actions[bot]@users.noreply.github.com"
      #     git add archive/index.qmd
      #     # The following line will only commit if there are actual changes
      #     git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Chore: Update archive list"
      #     git push

      # 5. Push docs/ back to main branch (for GitHub Pages)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
